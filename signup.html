<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Sign Up — TrainrPro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .signup-card {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border: 1px solid rgba(96,165,250,0.3);
      border-radius: 20px;
      padding: 40px;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    .card-logo {
      text-align: center;
      margin-bottom: 6px;
    }
    .card-logo i {
      font-size: 2.6rem;
      color: #60a5fa;
      text-shadow: 0 0 30px rgba(96,165,250,0.5);
    }
    .card-title {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      margin-bottom: 4px;
    }
    .card-sub {
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
      margin-bottom: 28px;
    }
    .field-label {
      color: rgba(255,255,255,0.6);
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      display: block;
    }
    .field-input {
      background: rgba(15,23,42,0.7);
      border: 2px solid rgba(96,165,250,0.3);
      color: white;
      border-radius: 8px;
      padding: 12px;
      width: 100%;
      font-size: 0.95rem;
      margin-bottom: 16px;
      outline: none;
      box-sizing: border-box;
    }
    .field-input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96,165,250,0.2);
    }
    .field-input::placeholder { color: rgba(255,255,255,0.3); }

    .btn-auth {
      background: #60a5fa;
      border: none;
      color: white;
      font-weight: 700;
      padding: 13px;
      border-radius: 25px;
      width: 100%;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(96,165,250,0.3);
      margin-bottom: 18px;
    }
    .btn-auth:hover { background: #3b82f6; transform: translateY(-2px); }
    .btn-auth:disabled { opacity: 0.6; transform: none; cursor: not-allowed; }
    .auth-switch {
      text-align: center;
      color: rgba(255,255,255,0.45);
      font-size: 0.88rem;
    }
    .auth-switch a { color: #60a5fa; text-decoration: none; font-weight: 600; }
    .auth-switch a:hover { color: #93c5fd; }
    .auth-error {
      color: #ef4444;
      font-size: 0.88rem;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 14px;
      display: none;
    }
    @media (max-width: 575px) {
      .signup-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>
<div class="signup-card">
  <div class="card-logo"><i class="fa-solid fa-dumbbell"></i></div>
  <h1 class="card-title">TrainrPro</h1>
  <p class="card-sub">Create your free account</p>

  <div class="auth-error" id="authError"></div>

  <label class="field-label">Full Name</label>
  <input type="text" class="field-input" id="displayName" placeholder="Jane Smith" />

  <label class="field-label">Email</label>
  <input type="email" class="field-input" id="email" placeholder="you@example.com" />

  <label class="field-label">Password</label>
  <input type="password" class="field-input" id="password" placeholder="Min 6 characters" />

  <button class="btn-auth" id="btnSignup" onclick="doSignup()">
    <i class="fa-solid fa-user-plus me-2"></i>Create Account
  </button>

  <p class="auth-switch">Already have an account? <a href="index.html">Sign in</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDReR325Fg0E1ygr0kyNB4tl176MrFDJxk",
    authDomain: "zbtrainer.firebaseapp.com",
    projectId: "zbtrainer",
    storageBucket: "zbtrainer.firebasestorage.app",
    messagingSenderId: "674267791113",
    appId: "1:674267791113:web:83da3e5b0db879f6881dd8"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  // Redirect if already logged in
  auth.onAuthStateChanged(async user => {
    if (user) {
      const snap = await db.collection('users').doc(user.uid).get();
      const role = snap.exists ? snap.data().role : 'athlete';
      window.location.href = role === 'trainer' ? 'trainer-dashboard.html' : 'athlete-dashboard.html';
    }
  });

  function showError(msg) {
    const el = document.getElementById('authError');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function setLoading(on) {
    const btn = document.getElementById('btnSignup');
    btn.disabled = on;
    btn.innerHTML = on
      ? '<i class="fa-solid fa-spinner fa-spin me-2"></i>Creating account…'
      : '<i class="fa-solid fa-user-plus me-2"></i>Create Account';
  }

  async function doSignup() {
    document.getElementById('authError').style.display = 'none';
    const displayName = document.getElementById('displayName').value.trim();
    const email       = document.getElementById('email').value.trim();
    const password    = document.getElementById('password').value;
    const role        = 'athlete';

    if (!displayName) { showError('Please enter your full name.'); return; }
    if (!email)       { showError('Please enter your email.'); return; }
    if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }

    setLoading(true);
    try {
      const cred = await auth.createUserWithEmailAndPassword(email, password);
      await cred.user.updateProfile({ displayName });
      await db.collection('users').doc(cred.user.uid).set({
        uid: cred.user.uid,
        displayName,
        email,
        role,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      window.location.href = role === 'trainer' ? 'trainer-dashboard.html' : 'athlete-dashboard.html';
    } catch (e) {
      showError(friendlyError(e.code));
      setLoading(false);
    }
  }

  function friendlyError(code) {
    const map = {
      'auth/email-already-in-use': 'An account with that email already exists.',
      'auth/invalid-email':        'Please enter a valid email address.',
      'auth/weak-password':        'Password must be at least 6 characters.',
    };
    return map[code] || 'Sign-up failed. Please try again.';
  }
</script>
</body>
</html>
