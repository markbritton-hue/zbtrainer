<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Schedule — ZBTrainer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: rgba(255,255,255,0.9);
    }

    /* ── Nav ── */
    .top-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px; border-bottom: 1px solid rgba(96,165,250,0.15);
      background: rgba(15,23,42,0.6);
    }
    .nav-brand {
      font-size: 1.35rem; font-weight: 800;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      display: flex; align-items: center; gap: 10px; text-decoration: none;
    }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .btn-back {
      background: none; border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6); font-size: 0.85rem; font-weight: 600;
      padding: 6px 16px; border-radius: 25px; cursor: pointer;
      text-decoration: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-back:hover { border-color: #60a5fa; color: #60a5fa; }
    .btn-logout {
      background: none; border: 1px solid rgba(239,68,68,0.4);
      color: rgba(239,68,68,0.8); font-size: 0.85rem; font-weight: 600;
      padding: 6px 16px; border-radius: 25px; cursor: pointer; transition: all 0.2s;
    }
    .btn-logout:hover { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,0.08); }

    /* ── Page header ── */
    .page-header {
      padding: 40px 0 28px;
      display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 16px;
    }
    .page-header h1 {
      font-size: 1.8rem; font-weight: 800;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0;
    }
    .page-header p { color: rgba(255,255,255,0.5); font-size: 0.9rem; margin: 4px 0 0; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 28px; }
    .tab {
      background: none; border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.5); font-size: 0.875rem; font-weight: 600;
      padding: 8px 20px; border-radius: 25px; cursor: pointer; transition: all 0.2s;
    }
    .tab.active {
      background: rgba(96,165,250,0.15); border-color: rgba(96,165,250,0.45); color: #60a5fa;
    }
    .tab:hover:not(.active) { border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.75); }

    /* ── Session cards ── */
    .sessions-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 48px; }

    .session-card {
      background: rgba(30,41,59,0.85); border: 1px solid rgba(96,165,250,0.2);
      border-radius: 14px; padding: 20px 24px;
      display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
      box-shadow: 0 6px 18px rgba(0,0,0,0.4); transition: all 0.25s;
    }
    .session-card:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.5); border-color: rgba(96,165,250,0.4); }

    .session-date-block {
      background: rgba(96,165,250,0.12); border: 1px solid rgba(96,165,250,0.25);
      border-radius: 10px; padding: 10px 16px; text-align: center; flex-shrink: 0; min-width: 64px;
    }
    .session-month { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #60a5fa; }
    .session-day   { font-size: 1.6rem; font-weight: 800; color: white; line-height: 1.1; }
    .session-dow   { font-size: 0.72rem; color: rgba(255,255,255,0.45); }

    .session-info { flex: 1; min-width: 160px; }
    .session-title { font-size: 1rem; font-weight: 700; color: rgba(255,255,255,0.9); margin-bottom: 4px; }
    .session-meta  { display: flex; flex-wrap: wrap; gap: 12px; }
    .session-meta span { color: rgba(255,255,255,0.45); font-size: 0.82rem; display: flex; align-items: center; gap: 5px; }

    .session-status {
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
      padding: 4px 12px; border-radius: 20px; white-space: nowrap;
    }
    .status-scheduled  { background: rgba(96,165,250,0.15);  border: 1px solid rgba(96,165,250,0.35);  color: #60a5fa; }
    .status-completed  { background: rgba(16,185,129,0.15);  border: 1px solid rgba(16,185,129,0.35);  color: #10b981; }
    .status-cancelled  { background: rgba(239,68,68,0.12);   border: 1px solid rgba(239,68,68,0.3);    color: #ef4444; }
    .status-requested  { background: rgba(245,158,11,0.15);  border: 1px solid rgba(245,158,11,0.35);  color: #f59e0b; }

    .session-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-cancel-session {
      background: none; border: 1px solid rgba(239,68,68,0.3);
      color: rgba(239,68,68,0.7); font-size: 0.8rem; font-weight: 600;
      padding: 5px 12px; border-radius: 20px; cursor: pointer; transition: all 0.2s;
    }
    .btn-cancel-session:hover { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,0.08); }

    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-state i { font-size: 3rem; color: rgba(96,165,250,0.25); margin-bottom: 16px; display: block; }
    .empty-state p { color: rgba(255,255,255,0.35); font-size: 0.95rem; }

    /* ── Request modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.8); z-index: 9999;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border: 1px solid rgba(96,165,250,0.3); border-radius: 20px;
      padding: 36px; width: 100%; max-width: 500px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    .modal-title {
      font-size: 1.3rem; font-weight: 800;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 22px;
    }
    .field-label {
      color: rgba(255,255,255,0.6); font-size: 0.82rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block;
    }
    .field-input, .field-select, .field-textarea {
      background: rgba(15,23,42,0.7); border: 2px solid rgba(96,165,250,0.25);
      color: white; border-radius: 8px; padding: 11px 14px;
      width: 100%; font-size: 0.95rem; margin-bottom: 16px; outline: none; box-sizing: border-box;
    }
    .field-input:focus, .field-select:focus, .field-textarea:focus { border-color: #60a5fa; box-shadow: 0 0 0 3px rgba(96,165,250,0.12); }
    .field-input::placeholder, .field-textarea::placeholder { color: rgba(255,255,255,0.3); }
    .field-select option { background: #1e293b; }
    .field-textarea { resize: vertical; min-height: 80px; font-family: inherit; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }
    .btn-cancel-modal {
      background: none; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.6);
      font-weight: 600; padding: 10px 22px; border-radius: 25px; cursor: pointer; transition: all 0.2s;
    }
    .btn-cancel-modal:hover { border-color: rgba(255,255,255,0.4); color: white; }
    .btn-save {
      background: #60a5fa; border: none; color: white; font-weight: 700;
      padding: 10px 26px; border-radius: 25px; cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(96,165,250,0.3);
    }
    .btn-save:hover { background: #3b82f6; transform: translateY(-2px); }
    .btn-save:disabled { opacity: 0.6; transform: none; cursor: not-allowed; }

    .btn-primary-app {
      background: #60a5fa; border: none; color: white; font-weight: 700;
      padding: 11px 24px; border-radius: 25px; font-size: 0.95rem;
      cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(96,165,250,0.3);
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-primary-app:hover { background: #3b82f6; transform: translateY(-2px); }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1e293b; border: 1px solid rgba(96,165,250,0.4);
      border-radius: 14px; padding: 14px 22px; z-index: 99999;
      display: none; align-items: center; gap: 10px; font-size: 0.9rem;
      color: rgba(255,255,255,0.85); box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }
    .toast.show { display: flex; }
    .toast.success { border-color: rgba(16,185,129,0.5); }
    .toast.error   { border-color: rgba(239,68,68,0.5); color: #ef4444; }

    /* ── Program banner ── */
    .program-banner {
      background: rgba(30,41,59,0.85); border: 1px solid rgba(167,139,250,0.25);
      border-radius: 15px; padding: 22px 26px;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
    }
    .program-banner-left { display: flex; align-items: center; gap: 16px; }
    .program-banner-icon {
      width: 48px; height: 48px; border-radius: 12px;
      background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; color: #a78bfa; flex-shrink: 0;
    }
    .program-banner-label { color: rgba(255,255,255,0.45); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
    .program-banner-name  { font-size: 1rem; font-weight: 700; color: #a78bfa; margin-bottom: 4px; }
    .program-banner-meta  { color: rgba(255,255,255,0.4); font-size: 0.82rem; display: flex; gap: 12px; flex-wrap: wrap; }
    .program-started-badge {
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
      padding: 4px 12px; border-radius: 20px;
      background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.35); color: #10b981;
    }
    .btn-start-program {
      background: #a78bfa; border: none; color: white; font-weight: 700;
      padding: 10px 22px; border-radius: 25px; font-size: 0.9rem;
      cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(167,139,250,0.3);
      display: inline-flex; align-items: center; gap: 7px; white-space: nowrap;
    }
    .btn-start-program:hover { background: #8b5cf6; transform: translateY(-2px); }
    .btn-change-date {
      background: none; border: 1px solid rgba(167,139,250,0.3); color: rgba(167,139,250,0.7);
      font-size: 0.82rem; font-weight: 600; padding: 6px 14px; border-radius: 20px;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-change-date:hover { border-color: #a78bfa; color: #a78bfa; }

    .loading-overlay {
      position: fixed; inset: 0; background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; font-size: 1.1rem; color: rgba(255,255,255,0.5); gap: 12px;
    }

    @media (max-width: 768px) {
      .top-nav { padding: 14px 16px; }
      .session-card { flex-direction: column; align-items: flex-start; gap: 14px; }
      .page-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <i class="fa-solid fa-spinner fa-spin"></i> Loading…
</div>

<nav class="top-nav">
  <a href="athlete-dashboard.html" class="nav-brand">
    <i class="fa-solid fa-dumbbell"></i> ZBTrainer
  </a>
  <div class="nav-right">
    <a href="athlete-dashboard.html" class="btn-back">
      <i class="fa-solid fa-arrow-left"></i> Dashboard
    </a>
    <button class="btn-logout" onclick="doSignOut()">
      <i class="fa-solid fa-right-from-bracket me-1"></i>Sign Out
    </button>
  </div>
</nav>

<div class="container" style="max-width:860px;">
  <div class="page-header">
    <div>
      <h1><i class="fa-solid fa-calendar-days me-2" style="font-size:1.5rem;"></i>My Schedule</h1>
      <p id="scheduleSubtitle">Your upcoming and past sessions.</p>
    </div>
    <button class="btn-primary-app" onclick="openModal()">
      <i class="fa-solid fa-plus"></i> Request Session
    </button>
  </div>

  <!-- Program card -->
  <div id="programSection" style="display:none; margin-bottom:28px;">
    <div class="program-banner" id="programBanner"></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-upcoming" onclick="setTab('upcoming')">Upcoming</button>
    <button class="tab" id="tab-past"     onclick="setTab('past')">Past</button>
    <button class="tab" id="tab-all"      onclick="setTab('all')">All</button>
  </div>

  <div class="sessions-list" id="sessionsList"></div>
</div>

<!-- Request Session Modal -->
<div class="modal-overlay" id="sessionModal">
  <div class="modal-box">
    <h2 class="modal-title"><i class="fa-solid fa-calendar-plus me-2"></i>Request a Session</h2>

    <div class="row g-3">
      <div class="col-md-6">
        <label class="field-label">Date</label>
        <input type="date" class="field-input" id="sessDate" />
      </div>
      <div class="col-md-6">
        <label class="field-label">Time</label>
        <input type="time" class="field-input" id="sessTime" />
      </div>
      <div class="col-12">
        <label class="field-label">Session Type</label>
        <select class="field-select" id="sessType">
          <option>1-on-1 Training</option>
          <option>Program Review</option>
          <option>Fitness Assessment</option>
          <option>Goal Setting</option>
          <option>Nutrition Consultation</option>
          <option>Check-In</option>
        </select>
      </div>
      <div class="col-12">
        <label class="field-label">Notes</label>
        <textarea class="field-textarea" id="sessNotes" placeholder="Anything your trainer should know…"></textarea>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel-modal" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="btnSave" onclick="saveSession()">
        <i class="fa-solid fa-paper-plane me-1"></i> Send Request
      </button>
    </div>
  </div>
</div>

<!-- Start Program Modal -->
<div class="modal-overlay" id="startProgramModal">
  <div class="modal-box">
    <h2 class="modal-title"><i class="fa-solid fa-play me-2"></i>Start Program</h2>
    <p style="color:rgba(255,255,255,0.5); font-size:0.88rem; margin-bottom:20px;">
      Program: <strong id="startProgName" style="color:#a78bfa;"></strong>
    </p>
    <label class="field-label">Start Date</label>
    <input type="date" class="field-input" id="startDate" />
    <p style="color:rgba(255,255,255,0.35); font-size:0.82rem; margin-top:-10px; margin-bottom:20px;">
      Your workout schedule will be built from this date.
    </p>
    <div class="modal-footer">
      <button class="btn-cancel-modal" onclick="closeStartModal()">Cancel</button>
      <button class="btn-save" id="btnStart" onclick="doStartProgram()" style="background:#a78bfa; box-shadow:0 4px 12px rgba(167,139,250,0.3);">
        <i class="fa-solid fa-play me-1"></i> Start Program
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDReR325Fg0E1ygr0kyNB4tl176MrFDJxk",
    authDomain: "zbtrainer.firebaseapp.com",
    projectId: "zbtrainer",
    storageBucket: "zbtrainer.firebasestorage.app",
    messagingSenderId: "674267791113",
    appId: "1:674267791113:web:83da3e5b0db879f6881dd8"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  let currentUser  = null;
  let allSessions  = [];
  let activeTab    = 'upcoming';
  let athleteData  = null;
  let programData  = null;
  const today      = new Date(); today.setHours(0,0,0,0);

  // ── Auth guard ──
  auth.onAuthStateChanged(async user => {
    if (!user) { window.location.href = 'index.html'; return; }
    try {
      const snap = await db.collection('users').doc(user.uid).get();
      if (!snap.exists) { window.location.href = 'index.html'; return; }
      if (snap.data().role === 'trainer') { window.location.href = 'trainer-dashboard.html'; return; }
      currentUser = user;
      athleteData = snap.data();

      const todayStr = today.toISOString().split('T')[0];
      document.getElementById('sessDate').min  = todayStr;
      document.getElementById('startDate').min = todayStr;
      document.getElementById('startDate').value = todayStr;

      loadProgram();
      loadSessions();
    } catch(e) {
      console.error(e);
      document.getElementById('loadingOverlay').style.display = 'none';
    }
  });

  // ── Load assigned program ──
  async function loadProgram() {
    const progName = athleteData.assignedProgram;
    if (!progName) return;

    const snap = await db.collection('programs').where('name', '==', progName).get();
    if (snap.empty) return;
    programData = { id: snap.docs[0].id, ...snap.docs[0].data() };
    renderProgramBanner();
  }

  function renderProgramBanner() {
    if (!programData) return;
    const section  = document.getElementById('programSection');
    const banner   = document.getElementById('programBanner');
    const started  = athleteData.programStartDate;
    const startStr = started ? new Date(started).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : null;

    section.style.display = 'block';
    banner.innerHTML = `
      <div class="program-banner-left">
        <div class="program-banner-icon"><i class="fa-solid fa-clipboard-list"></i></div>
        <div>
          <div class="program-banner-label">Assigned Program</div>
          <div class="program-banner-name">${esc(programData.name)}</div>
          <div class="program-banner-meta">
            <span><i class="fa-solid fa-signal me-1"></i>${esc(programData.difficulty)}</span>
            <span><i class="fa-regular fa-clock me-1"></i>${esc(programData.duration)}</span>
            <span><i class="fa-solid fa-calendar-days me-1"></i>${esc(programData.daysPerWeek)}</span>
            ${started ? `<span><i class="fa-solid fa-play me-1"></i>Started ${startStr}</span>` : ''}
          </div>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        ${started ? `<span class="program-started-badge"><i class="fa-solid fa-circle-check me-1"></i>Active</span>
          <button class="btn-change-date" onclick="openStartModal()"><i class="fa-solid fa-pen me-1"></i>Change Start Date</button>` :
          `<button class="btn-start-program" onclick="openStartModal()"><i class="fa-solid fa-play"></i> Start Program</button>`}
      </div>`;
  }

  function openStartModal() {
    document.getElementById('startProgName').textContent = programData?.name || '';
    if (athleteData.programStartDate) {
      document.getElementById('startDate').value = new Date(athleteData.programStartDate).toISOString().split('T')[0];
    }
    document.getElementById('startProgramModal').classList.add('open');
  }
  function closeStartModal() { document.getElementById('startProgramModal').classList.remove('open'); }

  async function doStartProgram() {
    const dateVal = document.getElementById('startDate').value;
    if (!dateVal) { showToast('Please pick a start date.', 'error'); return; }
    const btn = document.getElementById('btnStart');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-1"></i>';
    try {
      const ms = new Date(dateVal).getTime();
      await db.collection('users').doc(currentUser.uid).update({ programStartDate: ms });
      athleteData.programStartDate = ms;
      renderProgramBanner();
      showToast('Program started!', 'success');
      closeStartModal();
    } catch(e) {
      showToast('Error: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-play me-1"></i> Start Program';
    }
  }

  // ── Load ──
  function loadSessions() {
    db.collection('sessions')
      .where('athleteId', '==', currentUser.uid)
      .onSnapshot(snap => {
        allSessions = snap.docs
          .map(d => ({ id: d.id, ...d.data() }))
          .sort((a, b) => (a.dateMs || 0) - (b.dateMs || 0));
        render();
        document.getElementById('loadingOverlay').style.display = 'none';
      }, err => {
        console.error(err);
        document.getElementById('loadingOverlay').style.display = 'none';
      });
  }

  // ── Tabs ──
  function setTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    render();
  }

  // ── Render ──
  function render() {
    const list = document.getElementById('sessionsList');
    list.innerHTML = '';

    let filtered = allSessions;
    if (activeTab === 'upcoming') filtered = allSessions.filter(s => s.dateMs >= today.getTime() && s.status !== 'cancelled');
    if (activeTab === 'past')     filtered = allSessions.filter(s => s.dateMs <  today.getTime() || s.status === 'completed');

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <i class="fa-solid fa-calendar-days"></i>
        <p>${activeTab === 'upcoming' ? 'No upcoming sessions.<br>Click <strong style="color:#60a5fa;">+ Request Session</strong> to book one.' : 'No sessions here yet.'}</p>
      </div>`;
      return;
    }

    filtered.forEach(s => {
      const d      = new Date(s.dateMs);
      const month  = d.toLocaleDateString('en-US', { month: 'short' });
      const day    = d.getDate();
      const dow    = d.toLocaleDateString('en-US', { weekday: 'short' });
      const time   = s.time || '';
      const status = s.status || 'requested';
      const canCancel = status === 'requested' || status === 'scheduled';

      list.insertAdjacentHTML('beforeend', `
        <div class="session-card">
          <div class="session-date-block">
            <div class="session-month">${month}</div>
            <div class="session-day">${day}</div>
            <div class="session-dow">${dow}</div>
          </div>
          <div class="session-info">
            <div class="session-title">${esc(s.type || 'Session')}</div>
            <div class="session-meta">
              ${time ? `<span><i class="fa-regular fa-clock"></i> ${esc(time)}</span>` : ''}
              ${s.notes ? `<span><i class="fa-regular fa-note-sticky"></i> ${esc(s.notes)}</span>` : ''}
            </div>
          </div>
          <span class="session-status status-${status}">${statusLabel(status)}</span>
          ${canCancel ? `
          <div class="session-actions">
            <button class="btn-cancel-session" onclick="cancelSession('${s.id}')">
              <i class="fa-solid fa-xmark me-1"></i>Cancel
            </button>
          </div>` : ''}
        </div>`);
    });
  }

  function statusLabel(s) {
    return { requested: 'Requested', scheduled: 'Confirmed', completed: 'Completed', cancelled: 'Cancelled' }[s] || s;
  }

  // ── Request session ──
  function openModal() {
    document.getElementById('sessionModal').classList.add('open');
    document.getElementById('btnSave').disabled = false;
    document.getElementById('btnSave').innerHTML = '<i class="fa-solid fa-paper-plane me-1"></i> Send Request';
  }
  function closeModal() { document.getElementById('sessionModal').classList.remove('open'); }

  async function saveSession() {
    const date  = document.getElementById('sessDate').value;
    const time  = document.getElementById('sessTime').value;
    const type  = document.getElementById('sessType').value;
    const notes = document.getElementById('sessNotes').value.trim();

    if (!date) { showToast('Please select a date.', 'error'); return; }

    const btn = document.getElementById('btnSave');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-1"></i> Sending…';

    try {
      const dateMs = new Date(date).getTime();
      await db.collection('sessions').add({
        athleteId: currentUser.uid,
        athleteName: currentUser.displayName || currentUser.email,
        date, time, type, notes,
        dateMs,
        status: 'requested',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      showToast('Session request sent!', 'success');
      closeModal();
      document.getElementById('sessDate').value  = '';
      document.getElementById('sessTime').value  = '';
      document.getElementById('sessNotes').value = '';
    } catch(e) {
      showToast('Error: ' + e.message, 'error');
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-paper-plane me-1"></i> Send Request';
    }
  }

  // ── Cancel ──
  async function cancelSession(id) {
    if (!confirm('Cancel this session request?')) return;
    try {
      await db.collection('sessions').doc(id).update({ status: 'cancelled' });
      showToast('Session cancelled.', 'success');
    } catch(e) {
      showToast('Error cancelling session.', 'error');
    }
  }

  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.className = 'toast show ' + type;
    t.innerHTML = (type === 'success' ? '<i class="fa-solid fa-circle-check" style="color:#10b981;"></i> ' : '<i class="fa-solid fa-circle-exclamation"></i> ') + msg;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  async function doSignOut() { await auth.signOut(); window.location.href = 'index.html'; }

  document.getElementById('sessionModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.getElementById('startProgramModal').addEventListener('click', function(e) {
    if (e.target === this) closeStartModal();
  });
</script>
</body>
</html>
