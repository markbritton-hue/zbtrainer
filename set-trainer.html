<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Trainer Role</title>
  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.9);
    }
    .card {
      background: rgba(30,41,59,0.9);
      border: 1px solid rgba(167,139,250,0.3);
      border-radius: 20px;
      padding: 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    h1 { font-size: 1.4rem; font-weight: 800; color: #a78bfa; margin-bottom: 8px; }
    p  { color: rgba(255,255,255,0.55); font-size: 0.9rem; margin-bottom: 24px; }
    input {
      background: rgba(15,23,42,0.7);
      border: 2px solid rgba(96,165,250,0.3);
      color: white;
      border-radius: 8px;
      padding: 12px;
      width: 100%;
      font-size: 0.95rem;
      margin-bottom: 14px;
      outline: none;
      box-sizing: border-box;
    }
    input::placeholder { color: rgba(255,255,255,0.3); }
    input:focus { border-color: #60a5fa; }
    button {
      background: #a78bfa;
      border: none;
      color: white;
      font-weight: 700;
      padding: 13px;
      border-radius: 25px;
      width: 100%;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(167,139,250,0.3);
    }
    button:hover { background: #8b5cf6; transform: translateY(-2px); }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .msg {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .msg.success { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.4); color: #10b981; }
    .msg.error   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.3);  color: #ef4444; }
  </style>
</head>
<body>
<div class="card">
  <h1>🎽 Set Trainer Role</h1>
  <p>Enter the email of the account you want to make a trainer, then sign in with that account's password.</p>

  <input type="email"    id="email"    placeholder="trainer@email.com" />
  <input type="password" id="password" placeholder="Password" />
  <button id="btn" onclick="setTrainer()">Sign In &amp; Set as Trainer</button>
  <div class="msg" id="msg"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyDReR325Fg0E1ygr0kyNB4tl176MrFDJxk",
    authDomain: "zbtrainer.firebaseapp.com",
    projectId: "zbtrainer",
    storageBucket: "zbtrainer.firebasestorage.app",
    messagingSenderId: "674267791113",
    appId: "1:674267791113:web:83da3e5b0db879f6881dd8"
  });
  const auth = firebase.auth();
  const db   = firebase.firestore();

  function show(type, text) {
    const el = document.getElementById('msg');
    el.className = 'msg ' + type;
    el.textContent = text;
    el.style.display = 'block';
  }

  async function setTrainer() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('btn');
    if (!email || !password) { show('error', 'Please enter email and password.'); return; }

    btn.disabled = true;
    btn.textContent = 'Working…';
    try {
      const cred = await auth.signInWithEmailAndPassword(email, password);
      const user = cred.user;
      await db.collection('users').doc(user.uid).set({
        uid: user.uid,
        displayName: user.displayName || email.split('@')[0],
        email: user.email,
        role: 'trainer',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });

      show('success', '✓ Done! ' + email + ' is now a trainer. You can delete this file.');
      btn.textContent = 'Done!';
    } catch (e) {
      show('error', e.message);
      btn.disabled = false;
      btn.textContent = 'Sign In & Set as Trainer';
    }
  }
</script>
</body>
</html>
