<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>My Trainer — ZBTrainer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: rgba(255,255,255,0.9);
    }
    .top-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px; border-bottom: 1px solid rgba(96,165,250,0.15);
      background: rgba(15,23,42,0.6);
    }
    .nav-brand {
      font-size: 1.35rem; font-weight: 800;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      display: flex; align-items: center; gap: 10px; text-decoration: none;
    }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .btn-back {
      background: none; border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6); font-size: 0.85rem; font-weight: 600;
      padding: 6px 16px; border-radius: 25px; cursor: pointer;
      text-decoration: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-back:hover { border-color: #60a5fa; color: #60a5fa; }
    .btn-logout {
      background: none; border: 1px solid rgba(239,68,68,0.4);
      color: rgba(239,68,68,0.8); font-size: 0.85rem; font-weight: 600;
      padding: 6px 16px; border-radius: 25px; cursor: pointer; transition: all 0.2s;
    }
    .btn-logout:hover { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,0.08); }

    .page-wrap { max-width: 560px; margin: 0 auto; padding: 48px 20px; }

    .page-icon { font-size: 3rem; color: #60a5fa; text-shadow: 0 0 30px rgba(96,165,250,0.5); text-align: center; margin-bottom: 14px; }
    .page-title {
      font-size: 1.8rem; font-weight: 800; text-align: center;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px;
    }
    .page-sub { text-align: center; color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-bottom: 36px; }

    /* Connected state */
    .trainer-card {
      background: rgba(30,41,59,0.85); border: 1px solid rgba(96,165,250,0.25);
      border-radius: 16px; padding: 28px; margin-bottom: 20px;
    }
    .trainer-card-top { display: flex; align-items: center; gap: 16px; margin-bottom: 18px; }
    .trainer-avatar {
      width: 58px; height: 58px; border-radius: 50%;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; font-weight: 800; color: white; flex-shrink: 0;
    }
    .trainer-name { font-size: 1.1rem; font-weight: 700; color: rgba(255,255,255,0.9); margin-bottom: 3px; }
    .trainer-email { font-size: 0.82rem; color: rgba(255,255,255,0.4); }
    .trainer-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
      padding: 4px 12px; border-radius: 20px;
      background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.35); color: #a78bfa;
    }

    .program-card {
      background: rgba(15,23,42,0.6); border: 1px solid rgba(167,139,250,0.2);
      border-radius: 12px; padding: 18px 20px; margin-bottom: 16px;
    }
    .program-card-label { color: rgba(255,255,255,0.4); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .program-card-name { color: #a78bfa; font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .program-card-meta { color: rgba(255,255,255,0.45); font-size: 0.82rem; }

    .btn-disconnect {
      background: none; border: 1px solid rgba(239,68,68,0.35);
      color: rgba(239,68,68,0.7); font-size: 0.85rem; font-weight: 600;
      padding: 8px 20px; border-radius: 25px; cursor: pointer; transition: all 0.2s; width: 100%;
    }
    .btn-disconnect:hover { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,0.08); }

    /* Connect form */
    .connect-card {
      background: rgba(30,41,59,0.85); border: 1px solid rgba(96,165,250,0.25);
      border-radius: 16px; padding: 32px;
    }
    .field-label { color: rgba(255,255,255,0.6); font-size: 0.82rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: block; }
    .code-input {
      background: rgba(15,23,42,0.7); border: 2px solid rgba(96,165,250,0.3);
      color: white; border-radius: 8px; padding: 14px 16px;
      width: 100%; font-size: 1.4rem; font-weight: 700; letter-spacing: 6px;
      text-transform: uppercase; text-align: center; outline: none; margin-bottom: 16px;
      font-family: 'Courier New', monospace;
    }
    .code-input:focus { border-color: #60a5fa; box-shadow: 0 0 0 3px rgba(96,165,250,0.15); }
    .code-input::placeholder { color: rgba(255,255,255,0.2); letter-spacing: 4px; font-size: 1.1rem; }
    .btn-connect {
      background: #60a5fa; border: none; color: white; font-weight: 700;
      padding: 13px; border-radius: 25px; width: 100%; font-size: 1rem;
      cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(96,165,250,0.3);
    }
    .btn-connect:hover { background: #3b82f6; transform: translateY(-2px); }
    .btn-connect:disabled { opacity: 0.6; transform: none; cursor: not-allowed; }
    .error-box {
      color: #ef4444; font-size: 0.88rem;
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; display: none;
    }

    .loading-overlay {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; font-size: 1.1rem; color: rgba(255,255,255,0.5); gap: 12px;
    }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1e293b; border: 1px solid rgba(96,165,250,0.4);
      border-radius: 14px; padding: 14px 22px; z-index: 99999;
      display: none; align-items: center; gap: 10px; font-size: 0.9rem;
      color: rgba(255,255,255,0.85); box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }
    .toast.show { display: flex; }
    .toast.success { border-color: rgba(16,185,129,0.5); }
    .toast.error   { border-color: rgba(239,68,68,0.5); color: #ef4444; }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <i class="fa-solid fa-spinner fa-spin"></i> Loading…
</div>

<nav class="top-nav">
  <a href="athlete-dashboard.html" class="nav-brand">
    <i class="fa-solid fa-dumbbell"></i> ZBTrainer
  </a>
  <div class="nav-right">
    <a href="athlete-dashboard.html" class="btn-back">
      <i class="fa-solid fa-arrow-left"></i> Dashboard
    </a>
    <button class="btn-logout" onclick="doSignOut()">
      <i class="fa-solid fa-right-from-bracket me-1"></i>Sign Out
    </button>
  </div>
</nav>

<div class="page-wrap">
  <div class="page-icon"><i class="fa-solid fa-user-tie"></i></div>
  <h1 class="page-title">My Trainer</h1>
  <p class="page-sub">Connect with your personal trainer to receive programs and feedback.</p>

  <!-- Connected state -->
  <div id="connectedView" style="display:none;">
    <div class="trainer-card">
      <div class="trainer-card-top">
        <div class="trainer-avatar" id="trainerAvatar">T</div>
        <div>
          <div class="trainer-name" id="trainerName">—</div>
          <div class="trainer-email" id="trainerEmail">—</div>
          <span class="trainer-badge mt-2"><i class="fa-solid fa-whistle me-1"></i>Trainer</span>
        </div>
      </div>
    </div>

    <div class="program-card" id="programCard" style="display:none;">
      <div class="program-card-label"><i class="fa-solid fa-clipboard-list me-1"></i> Assigned Program</div>
      <div class="program-card-name" id="programName">—</div>
      <div class="program-card-meta" id="programMeta"></div>
    </div>

    <button class="btn-disconnect" onclick="disconnect()">
      <i class="fa-solid fa-link-slash me-2"></i>Disconnect from Trainer
    </button>
  </div>

  <!-- Not connected -->
  <div id="connectView">
    <div class="connect-card">
      <label class="field-label"><i class="fa-solid fa-hashtag me-1"></i> Enter Trainer Code</label>
      <div class="error-box" id="codeError"></div>
      <input type="text" class="code-input" id="codeInput" placeholder="ABC123" maxlength="6" oninput="this.value=this.value.toUpperCase()" />
      <button class="btn-connect" id="btnConnect" onclick="connectToTrainer()">
        <i class="fa-solid fa-link me-2"></i>Connect to Trainer
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDReR325Fg0E1ygr0kyNB4tl176MrFDJxk",
    authDomain: "zbtrainer.firebaseapp.com",
    projectId: "zbtrainer",
    storageBucket: "zbtrainer.firebasestorage.app",
    messagingSenderId: "674267791113",
    appId: "1:674267791113:web:83da3e5b0db879f6881dd8"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  let currentUser = null;
  let athleteData = null;

  auth.onAuthStateChanged(async user => {
    if (!user) { window.location.href = 'index.html'; return; }
    try {
      const snap = await db.collection('users').doc(user.uid).get();
      if (!snap.exists) { window.location.href = 'index.html'; return; }
      if (snap.data().role !== 'athlete') { window.location.href = 'trainer-dashboard.html'; return; }
      currentUser = user;
      athleteData = snap.data();
      render();
    } catch(e) {
      console.error('Auth load error:', e);
      // Show page anyway — don't redirect on permission errors
    }
    document.getElementById('loadingOverlay').style.display = 'none';
  });

  async function render() {
    if (athleteData.trainerId) {
      // Load trainer info
      const trainerSnap = await db.collection('users').doc(athleteData.trainerId).get();
      if (trainerSnap.exists) {
        const t = trainerSnap.data();
        document.getElementById('trainerName').textContent  = t.displayName || 'Trainer';
        document.getElementById('trainerEmail').textContent = t.email || '';
        document.getElementById('trainerAvatar').textContent = getInitials(t.displayName || t.email || 'T');
      }
      // Show assigned program
      if (athleteData.assignedProgram) {
        document.getElementById('programName').textContent = athleteData.assignedProgram;
        document.getElementById('programCard').style.display = 'block';
      }
      document.getElementById('connectedView').style.display = 'block';
      document.getElementById('connectView').style.display   = 'none';
    } else {
      document.getElementById('connectedView').style.display = 'none';
      document.getElementById('connectView').style.display   = 'block';
    }
  }

  async function connectToTrainer() {
    const code = document.getElementById('codeInput').value.trim().toUpperCase();
    const errEl = document.getElementById('codeError');
    errEl.style.display = 'none';
    if (code.length < 4) { errEl.textContent = 'Please enter a valid trainer code.'; errEl.style.display = 'block'; return; }

    const btn = document.getElementById('btnConnect');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>Connecting…';

    try {
      // Find trainer by code
      const snap = await db.collection('users').where('trainerCode', '==', code).where('role', '==', 'trainer').get();
      if (snap.empty) {
        errEl.textContent = 'Trainer code not found. Please check and try again.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-link me-2"></i>Connect to Trainer';
        return;
      }
      const trainerDoc = snap.docs[0];
      await db.collection('users').doc(currentUser.uid).update({ trainerId: trainerDoc.id });
      athleteData.trainerId = trainerDoc.id;
      showToast('Connected to trainer!', 'success');
      render();
    } catch(e) {
      errEl.textContent = 'Error: ' + e.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-link me-2"></i>Connect to Trainer';
    }
  }

  async function disconnect() {
    if (!confirm('Disconnect from your trainer? Your assigned program will also be removed.')) return;
    try {
      await db.collection('users').doc(currentUser.uid).update({
        trainerId: firebase.firestore.FieldValue.delete(),
        assignedProgram: firebase.firestore.FieldValue.delete()
      });
      athleteData.trainerId = null;
      athleteData.assignedProgram = null;
      showToast('Disconnected.', 'success');
      render();
    } catch(e) {
      showToast('Error disconnecting.', 'error');
    }
  }

  function getInitials(name) {
    const parts = name.trim().split(' ');
    return parts.length >= 2 ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase() : name.slice(0,2).toUpperCase();
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.className = 'toast show ' + type;
    t.innerHTML = (type === 'success' ? '<i class="fa-solid fa-circle-check" style="color:#10b981;"></i> ' : '<i class="fa-solid fa-circle-exclamation"></i> ') + msg;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  async function doSignOut() { await auth.signOut(); window.location.href = 'index.html'; }
</script>
</body>
</html>
