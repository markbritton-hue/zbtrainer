<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Programs — ZBTrainer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: rgba(255,255,255,0.9);
    }

    /* ── Nav ── */
    .top-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid rgba(167,139,250,0.15);
      background: rgba(15,23,42,0.6);
    }
    .nav-brand {
      font-size: 1.35rem; font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
    }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .btn-back {
      background: none; border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6); font-size: 0.85rem; font-weight: 600;
      padding: 6px 16px; border-radius: 25px; cursor: pointer;
      text-decoration: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-back:hover { border-color: #a78bfa; color: #a78bfa; background: rgba(167,139,250,0.08); }
    .btn-logout {
      background: none; border: 1px solid rgba(239,68,68,0.4);
      color: rgba(239,68,68,0.8); font-size: 0.85rem; font-weight: 600;
      padding: 6px 16px; border-radius: 25px; cursor: pointer; transition: all 0.2s;
    }
    .btn-logout:hover { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,0.08); }

    /* ── Page header ── */
    .page-header {
      padding: 40px 0 30px;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
    }
    .page-header h1 {
      font-size: 1.8rem; font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin: 0;
    }
    .page-header p { color: rgba(255,255,255,0.5); font-size: 0.9rem; margin: 4px 0 0; }

    /* ── Buttons ── */
    .btn-primary-app {
      background: #a78bfa; border: none; color: white; font-weight: 700;
      padding: 11px 24px; border-radius: 25px; font-size: 0.95rem;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(167,139,250,0.3);
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-primary-app:hover { background: #8b5cf6; transform: translateY(-2px); box-shadow: 0 6px 16px rgba(167,139,250,0.4); }
    .btn-secondary {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.8); font-weight: 600;
      padding: 8px 18px; border-radius: 25px; font-size: 0.88rem;
      cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.35); }
    .btn-danger {
      background: none; border: 1px solid rgba(239,68,68,0.35);
      color: rgba(239,68,68,0.75); font-size: 0.82rem; font-weight: 600;
      padding: 5px 12px; border-radius: 20px; cursor: pointer; transition: all 0.2s;
    }
    .btn-danger:hover { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,0.08); }
    .btn-edit {
      background: none; border: 1px solid rgba(96,165,250,0.35);
      color: rgba(96,165,250,0.75); font-size: 0.82rem; font-weight: 600;
      padding: 5px 12px; border-radius: 20px; cursor: pointer; transition: all 0.2s;
    }
    .btn-edit:hover { border-color: #60a5fa; color: #60a5fa; background: rgba(96,165,250,0.08); }

    /* ── Program cards ── */
    .programs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-bottom: 48px; }
    .program-card {
      background: rgba(30,41,59,0.85); border: 1px solid rgba(167,139,250,0.2);
      border-radius: 15px; padding: 24px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4); transition: all 0.3s ease;
    }
    .program-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.5); border-color: rgba(167,139,250,0.4); }
    .program-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .program-card-title { font-size: 1.1rem; font-weight: 700; color: #a78bfa; margin: 0 0 4px; }
    .program-card-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .badge-pill {
      font-size: 0.75rem; font-weight: 600; padding: 3px 10px; border-radius: 20px;
      background: rgba(167,139,250,0.12); border: 1px solid rgba(167,139,250,0.3); color: #a78bfa;
    }
    .badge-pill.blue { background: rgba(96,165,250,0.12); border-color: rgba(96,165,250,0.3); color: #60a5fa; }
    .badge-pill.green { background: rgba(16,185,129,0.12); border-color: rgba(16,185,129,0.3); color: #10b981; }
    .badge-pill.amber { background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.3); color: #f59e0b; }
    .program-card-desc { color: rgba(255,255,255,0.55); font-size: 0.875rem; margin-bottom: 16px; line-height: 1.5; }
    .program-card-exercises { border-top: 1px solid rgba(255,255,255,0.08); padding-top: 14px; margin-bottom: 16px; }
    .exercise-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 0.875rem;
    }
    .exercise-row:last-child { border-bottom: none; }
    .exercise-name { color: rgba(255,255,255,0.85); font-weight: 500; }
    .exercise-detail { color: rgba(255,255,255,0.4); font-size: 0.8rem; }
    .program-card-footer { display: flex; gap: 8px; }
    .no-programs {
      grid-column: 1/-1; text-align: center; padding: 60px 20px;
      color: rgba(255,255,255,0.3);
    }
    .no-programs i { font-size: 3rem; margin-bottom: 16px; display: block; color: rgba(167,139,250,0.3); }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.8); z-index: 9999;
      align-items: flex-start; justify-content: center;
      padding: 20px; overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border: 1px solid rgba(167,139,250,0.3); border-radius: 20px;
      padding: 36px; width: 100%; max-width: 660px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8); margin: auto;
    }
    .modal-title {
      font-size: 1.4rem; font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 24px;
    }
    .field-label {
      color: rgba(255,255,255,0.6); font-size: 0.82rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block;
    }
    .field-input, .field-select, .field-textarea {
      background: rgba(15,23,42,0.7); border: 2px solid rgba(167,139,250,0.25);
      color: white; border-radius: 8px; padding: 11px 14px;
      width: 100%; font-size: 0.95rem; margin-bottom: 16px; outline: none; box-sizing: border-box;
    }
    .field-input:focus, .field-select:focus, .field-textarea:focus {
      border-color: #a78bfa; box-shadow: 0 0 0 3px rgba(167,139,250,0.15);
    }
    .field-input::placeholder, .field-textarea::placeholder { color: rgba(255,255,255,0.3); }
    .field-select option { background: #1e293b; }
    .field-textarea { resize: vertical; min-height: 80px; font-family: inherit; }

    /* ── Exercise builder ── */
    .exercises-section { margin-top: 8px; }
    .exercises-section-label {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .exercise-builder-row {
      background: rgba(15,23,42,0.5); border: 1px solid rgba(167,139,250,0.15);
      border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; position: relative;
    }
    .exercise-builder-row .remove-ex {
      position: absolute; top: 10px; right: 12px;
      background: none; border: none; color: rgba(239,68,68,0.5);
      font-size: 1rem; cursor: pointer; padding: 0; line-height: 1;
    }
    .exercise-builder-row .remove-ex:hover { color: #ef4444; }
    .ex-grid { display: grid; grid-template-columns: 1fr 60px 60px 80px; gap: 10px; align-items: end; }
    .ex-grid-full { grid-column: 1 / -1; }
    .ex-mini-label {
      color: rgba(255,255,255,0.5); font-size: 0.75rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; display: block;
    }
    .ex-input {
      background: rgba(15,23,42,0.8); border: 1px solid rgba(167,139,250,0.2);
      color: white; border-radius: 6px; padding: 8px 10px;
      width: 100%; font-size: 0.875rem; outline: none; box-sizing: border-box;
    }
    .ex-input:focus { border-color: #a78bfa; }
    .ex-input::placeholder { color: rgba(255,255,255,0.25); }
    .ex-notes { grid-column: 1/-1; }

    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 20px; }
    .modal-footer .btn-cancel {
      background: none; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.6);
      font-weight: 600; padding: 11px 24px; border-radius: 25px; cursor: pointer; transition: all 0.2s;
    }
    .modal-footer .btn-cancel:hover { border-color: rgba(255,255,255,0.4); color: white; }
    .modal-footer .btn-save {
      background: #a78bfa; border: none; color: white; font-weight: 700;
      padding: 11px 28px; border-radius: 25px; cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(167,139,250,0.3);
    }
    .modal-footer .btn-save:hover { background: #8b5cf6; transform: translateY(-2px); }
    .modal-footer .btn-save:disabled { opacity: 0.6; transform: none; cursor: not-allowed; }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1e293b; border: 1px solid rgba(167,139,250,0.4);
      border-radius: 14px; padding: 14px 22px; z-index: 99999;
      display: none; align-items: center; gap: 10px;
      font-size: 0.9rem; color: rgba(255,255,255,0.85);
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }
    .toast.show { display: flex; }
    .toast.success { border-color: rgba(16,185,129,0.5); }
    .toast.error   { border-color: rgba(239,68,68,0.5); color: #ef4444; }

    .loading-overlay {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; font-size: 1.1rem; color: rgba(255,255,255,0.5); gap: 12px;
    }

    @media (max-width: 575px) {
      .modal-box { padding: 24px 18px; }
      .ex-grid { grid-template-columns: 1fr 55px 55px 70px; gap: 8px; }
      .page-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <i class="fa-solid fa-spinner fa-spin"></i> Loading…
</div>

<!-- Nav -->
<nav class="top-nav">
  <a href="trainer-dashboard.html" class="nav-brand">
    <i class="fa-solid fa-dumbbell"></i> ZBTrainer
  </a>
  <div class="nav-right">
    <a href="trainer-dashboard.html" class="btn-back">
      <i class="fa-solid fa-arrow-left"></i> Dashboard
    </a>
    <button class="btn-logout" onclick="doSignOut()">
      <i class="fa-solid fa-right-from-bracket me-1"></i>Sign Out
    </button>
  </div>
</nav>

<!-- Main -->
<div class="container" style="max-width:1100px;">
  <div class="page-header">
    <div>
      <h1><i class="fa-solid fa-clipboard-list me-2" style="font-size:1.5rem;"></i>Programs</h1>
      <p>Build and manage workout programs for your athletes.</p>
    </div>
    <button class="btn-primary-app" onclick="openModal()">
      <i class="fa-solid fa-plus"></i> New Program
    </button>
  </div>

  <!-- Filter bar -->
  <div class="d-flex gap-2 flex-wrap mb-4">
    <button class="btn-secondary active-filter" id="filter-all"    onclick="setFilter('all')">All</button>
    <button class="btn-secondary" id="filter-beginner" onclick="setFilter('Beginner')">Beginner</button>
    <button class="btn-secondary" id="filter-intermediate" onclick="setFilter('Intermediate')">Intermediate</button>
    <button class="btn-secondary" id="filter-advanced" onclick="setFilter('Advanced')">Advanced</button>
  </div>

  <!-- Programs grid -->
  <div class="programs-grid" id="programsGrid">
    <div class="no-programs" id="emptyState" style="display:none;">
      <i class="fa-solid fa-clipboard-list"></i>
      <p style="font-size:1rem; color:rgba(255,255,255,0.4);">No programs yet.<br>Click <strong style="color:#a78bfa;">+ New Program</strong> to create your first one.</p>
    </div>
  </div>
</div>

<!-- Create / Edit Modal -->
<div class="modal-overlay" id="programModal">
  <div class="modal-box">
    <h2 class="modal-title" id="modalTitle">New Program</h2>

    <div class="row g-3">
      <div class="col-12">
        <label class="field-label">Program Name</label>
        <input type="text" class="field-input" id="progName" placeholder="e.g. 8-Week Strength Builder" />
      </div>
      <div class="col-md-4">
        <label class="field-label">Difficulty</label>
        <select class="field-select" id="progDifficulty">
          <option value="Beginner">Beginner</option>
          <option value="Intermediate" selected>Intermediate</option>
          <option value="Advanced">Advanced</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="field-label">Duration</label>
        <select class="field-select" id="progDuration">
          <option>4 weeks</option>
          <option>6 weeks</option>
          <option selected>8 weeks</option>
          <option>10 weeks</option>
          <option>12 weeks</option>
          <option>Ongoing</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="field-label">Days / Week</label>
        <select class="field-select" id="progDays">
          <option>2 days</option>
          <option>3 days</option>
          <option selected>4 days</option>
          <option>5 days</option>
          <option>6 days</option>
        </select>
      </div>
      <div class="col-12">
        <label class="field-label">Goal / Focus</label>
        <select class="field-select" id="progGoal">
          <option>Strength</option>
          <option>Muscle Building (Hypertrophy)</option>
          <option>Fat Loss</option>
          <option>Endurance</option>
          <option>Athletic Performance</option>
          <option>Flexibility &amp; Mobility</option>
          <option>General Fitness</option>
        </select>
      </div>
      <div class="col-12">
        <label class="field-label">Description</label>
        <textarea class="field-textarea" id="progDesc" placeholder="Brief overview of this program — what to expect, who it's for…"></textarea>
      </div>
    </div>

    <!-- Exercises -->
    <div class="exercises-section">
      <div class="exercises-section-label">
        <label class="field-label" style="margin:0;">Exercises</label>
        <button class="btn-secondary" onclick="addExerciseRow()" style="font-size:0.82rem; padding:6px 14px;">
          <i class="fa-solid fa-plus"></i> Add Exercise
        </button>
      </div>
      <div id="exercisesList"></div>
      <p id="noExercisesHint" style="color:rgba(255,255,255,0.3); font-size:0.85rem; text-align:center; padding:16px 0;">
        No exercises added yet. Click <strong style="color:#a78bfa;">+ Add Exercise</strong> above.
      </p>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="btnSave" onclick="saveProgram()">
        <i class="fa-solid fa-floppy-disk me-1"></i> Save Program
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDReR325Fg0E1ygr0kyNB4tl176MrFDJxk",
    authDomain: "zbtrainer.firebaseapp.com",
    projectId: "zbtrainer",
    storageBucket: "zbtrainer.firebasestorage.app",
    messagingSenderId: "674267791113",
    appId: "1:674267791113:web:83da3e5b0db879f6881dd8"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  let currentUser  = null;
  let allPrograms  = [];
  let activeFilter = 'all';
  let editingId    = null;

  // ── Auth guard ──
  auth.onAuthStateChanged(async user => {
    if (!user) { window.location.href = 'index.html'; return; }
    const snap = await db.collection('users').doc(user.uid).get();
    if (!snap.exists || snap.data().role !== 'trainer') {
      window.location.href = 'athlete-dashboard.html'; return;
    }
    currentUser = user;
    loadPrograms();
  });

  // ── Load programs ──
  function loadPrograms() {
    db.collection('programs')
      .where('trainerId', '==', currentUser.uid)
      .onSnapshot(snap => {
        allPrograms = snap.docs
          .map(d => ({ id: d.id, ...d.data() }))
          .sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
        renderPrograms();
        document.getElementById('loadingOverlay').style.display = 'none';
      }, err => {
        console.error(err);
        document.getElementById('loadingOverlay').style.display = 'none';
      });
  }

  // ── Render ──
  function renderPrograms() {
    const grid = document.getElementById('programsGrid');
    const empty = document.getElementById('emptyState');
    const filtered = activeFilter === 'all'
      ? allPrograms
      : allPrograms.filter(p => p.difficulty === activeFilter);

    // Remove existing cards (keep emptyState node)
    [...grid.querySelectorAll('.program-card')].forEach(c => c.remove());

    if (filtered.length === 0) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    filtered.forEach(p => {
      const diffColor = { Beginner: 'green', Intermediate: 'amber', Advanced: 'blue' }[p.difficulty] || '';
      const exRows = (p.exercises || []).slice(0, 4).map(ex => `
        <div class="exercise-row">
          <span class="exercise-name">${esc(ex.name)}</span>
          <span class="exercise-detail">${esc(ex.sets)} sets &times; ${esc(ex.reps)} reps${ex.rest ? ' &nbsp;|&nbsp; ' + esc(ex.rest) + 's rest' : ''}</span>
        </div>`).join('');
      const moreCount = (p.exercises || []).length - 4;

      grid.insertAdjacentHTML('beforeend', `
        <div class="program-card" id="card-${p.id}">
          <div class="program-card-header">
            <div>
              <h3 class="program-card-title">${esc(p.name)}</h3>
            </div>
          </div>
          <div class="program-card-meta">
            <span class="badge-pill ${diffColor}">${esc(p.difficulty)}</span>
            <span class="badge-pill"><i class="fa-regular fa-clock me-1"></i>${esc(p.duration)}</span>
            <span class="badge-pill"><i class="fa-solid fa-calendar-days me-1"></i>${esc(p.daysPerWeek)}</span>
            <span class="badge-pill"><i class="fa-solid fa-bullseye me-1"></i>${esc(p.goal)}</span>
          </div>
          ${p.description ? `<p class="program-card-desc">${esc(p.description)}</p>` : ''}
          ${p.exercises && p.exercises.length > 0 ? `
            <div class="program-card-exercises">
              ${exRows}
              ${moreCount > 0 ? `<p style="color:rgba(255,255,255,0.35);font-size:0.8rem;margin:8px 0 0;text-align:center;">+${moreCount} more exercise${moreCount>1?'s':''}</p>` : ''}
            </div>` : ''}
          <div class="program-card-footer">
            <button class="btn-edit" onclick="editProgram('${p.id}')"><i class="fa-solid fa-pen me-1"></i>Edit</button>
            <button class="btn-danger" onclick="deleteProgram('${p.id}', '${esc(p.name)}')"><i class="fa-solid fa-trash me-1"></i>Delete</button>
          </div>
        </div>`);
    });
  }

  // ── Filter ──
  function setFilter(val) {
    activeFilter = val;
    document.querySelectorAll('.active-filter').forEach(b => b.classList.remove('active-filter'));
    document.getElementById('filter-' + val.toLowerCase()).classList.add('active-filter');
    renderPrograms();
  }

  // ── Modal ──
  let exerciseCount = 0;

  function openModal(reset = true) {
    if (reset) {
      editingId = null;
      document.getElementById('modalTitle').textContent = 'New Program';
      document.getElementById('progName').value = '';
      document.getElementById('progDifficulty').value = 'Intermediate';
      document.getElementById('progDuration').value = '8 weeks';
      document.getElementById('progDays').value = '4 days';
      document.getElementById('progGoal').value = 'Strength';
      document.getElementById('progDesc').value = '';
      document.getElementById('exercisesList').innerHTML = '';
      exerciseCount = 0;
      updateExerciseHint();
    }
    document.getElementById('programModal').classList.add('open');
    document.getElementById('btnSave').disabled = false;
    document.getElementById('btnSave').innerHTML = '<i class="fa-solid fa-floppy-disk me-1"></i> Save Program';
  }

  function closeModal() {
    document.getElementById('programModal').classList.remove('open');
  }

  function addExerciseRow(data = {}) {
    exerciseCount++;
    document.getElementById('noExercisesHint').style.display = 'none';
    const idx = exerciseCount;
    document.getElementById('exercisesList').insertAdjacentHTML('beforeend', `
      <div class="exercise-builder-row" id="ex-${idx}">
        <button class="remove-ex" onclick="removeExercise(${idx})" title="Remove"><i class="fa-solid fa-xmark"></i></button>
        <div class="ex-grid">
          <div>
            <span class="ex-mini-label">Exercise Name</span>
            <input class="ex-input" id="ex-name-${idx}" placeholder="e.g. Barbell Squat" value="${esc(data.name||'')}" />
          </div>
          <div>
            <span class="ex-mini-label">Sets</span>
            <input class="ex-input" id="ex-sets-${idx}" placeholder="3" value="${esc(data.sets||'')}" style="text-align:center;" />
          </div>
          <div>
            <span class="ex-mini-label">Reps</span>
            <input class="ex-input" id="ex-reps-${idx}" placeholder="8" value="${esc(data.reps||'')}" style="text-align:center;" />
          </div>
          <div>
            <span class="ex-mini-label">Rest (sec)</span>
            <input class="ex-input" id="ex-rest-${idx}" placeholder="90" value="${esc(data.rest||'')}" style="text-align:center;" />
          </div>
          <div class="ex-notes">
            <span class="ex-mini-label">Notes / Cues</span>
            <input class="ex-input" id="ex-notes-${idx}" placeholder="e.g. Keep chest up, drive knees out" value="${esc(data.notes||'')}" />
          </div>
        </div>
      </div>`);
  }

  function removeExercise(idx) {
    document.getElementById('ex-' + idx).remove();
    updateExerciseHint();
  }

  function updateExerciseHint() {
    const rows = document.querySelectorAll('.exercise-builder-row');
    document.getElementById('noExercisesHint').style.display = rows.length === 0 ? 'block' : 'none';
  }

  function collectExercises() {
    const rows = document.querySelectorAll('.exercise-builder-row');
    return [...rows].map(row => {
      const idx = row.id.split('-')[1];
      return {
        name:  document.getElementById('ex-name-'  + idx).value.trim(),
        sets:  document.getElementById('ex-sets-'  + idx).value.trim(),
        reps:  document.getElementById('ex-reps-'  + idx).value.trim(),
        rest:  document.getElementById('ex-rest-'  + idx).value.trim(),
        notes: document.getElementById('ex-notes-' + idx).value.trim(),
      };
    }).filter(ex => ex.name);
  }

  // ── Save ──
  async function saveProgram() {
    const name = document.getElementById('progName').value.trim();
    if (!name) { showToast('Please enter a program name.', 'error'); return; }

    const btn = document.getElementById('btnSave');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-1"></i> Saving…';

    const data = {
      name,
      difficulty:  document.getElementById('progDifficulty').value,
      duration:    document.getElementById('progDuration').value,
      daysPerWeek: document.getElementById('progDays').value,
      goal:        document.getElementById('progGoal').value,
      description: document.getElementById('progDesc').value.trim(),
      exercises:   collectExercises(),
      trainerId:   currentUser.uid,
    };

    try {
      if (editingId) {
        await db.collection('programs').doc(editingId).update({ ...data, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        showToast('Program updated!', 'success');
      } else {
        data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        await db.collection('programs').add(data);
        showToast('Program created!', 'success');
      }
      closeModal();
    } catch (e) {
      showToast('Error saving program: ' + e.message, 'error');
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-floppy-disk me-1"></i> Save Program';
    }
  }

  // ── Edit ──
  function editProgram(id) {
    const p = allPrograms.find(x => x.id === id);
    if (!p) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = 'Edit Program';
    document.getElementById('progName').value       = p.name || '';
    document.getElementById('progDifficulty').value = p.difficulty || 'Intermediate';
    document.getElementById('progDuration').value   = p.duration || '8 weeks';
    document.getElementById('progDays').value       = p.daysPerWeek || '4 days';
    document.getElementById('progGoal').value       = p.goal || 'Strength';
    document.getElementById('progDesc').value       = p.description || '';
    document.getElementById('exercisesList').innerHTML = '';
    exerciseCount = 0;
    (p.exercises || []).forEach(ex => addExerciseRow(ex));
    updateExerciseHint();
    openModal(false);
  }

  // ── Delete ──
  async function deleteProgram(id, name) {
    if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
    try {
      await db.collection('programs').doc(id).delete();
      showToast('Program deleted.', 'success');
    } catch (e) {
      showToast('Error deleting program.', 'error');
    }
  }

  // ── Toast ──
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.className = 'toast show ' + type;
    t.innerHTML = (type === 'success' ? '<i class="fa-solid fa-circle-check" style="color:#10b981;"></i> ' : '<i class="fa-solid fa-circle-exclamation"></i> ') + msg;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ── Sign out ──
  async function doSignOut() { await auth.signOut(); window.location.href = 'index.html'; }

  // ── Escape HTML ──
  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Close modal on backdrop click
  document.getElementById('programModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // Active filter style
  const style = document.createElement('style');
  style.textContent = '.active-filter { background: rgba(167,139,250,0.2) !important; border-color: rgba(167,139,250,0.5) !important; color: #a78bfa !important; }';
  document.head.appendChild(style);
</script>
</body>
</html>
